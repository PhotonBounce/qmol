name: mobile

# Compile-checks the Flutter app (mobile/) on every change. The backend CI env
# has no Android toolchain, so this is where the app actually gets built.
on:
  push:
    paths: ["mobile/**", ".github/workflows/mobile.yml"]
  pull_request:
    paths: ["mobile/**", ".github/workflows/mobile.yml"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Scaffold project + drop in the app kit
        run: |
          flutter create --org app.qmol --project-name qmol /tmp/qmol_app
          cp -r mobile/lib mobile/pubspec.yaml mobile/analysis_options.yaml /tmp/qmol_app/
      - name: pub get
        working-directory: /tmp/qmol_app
        run: flutter pub get
      - name: analyze (informational)
        working-directory: /tmp/qmol_app
        run: flutter analyze || echo "::warning::flutter analyze reported issues"
      - name: build debug APK (the gate)
        working-directory: /tmp/qmol_app
        run: flutter build apk --debug --dart-define=QMOL_API=https://qua-22p1.onrender.com
      # Expose the built APK as a downloadable artifact so it can be sideloaded
      # and tested straight from the Actions run (no signing/release needed).
      - name: Stage APK
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp /tmp/qmol_app/build/app/outputs/flutter-apk/app-debug.apk "$GITHUB_WORKSPACE/dist/qmol-debug.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: qmol-debug-apk
          path: dist/qmol-debug.apk
          if-no-files-found: error

name: release-aab

# Builds the Android App Bundle (.aab) — the artifact Google Play requires for
# a production release — and uploads it as a workflow artifact.
#
# Signing: Play uses Play App Signing, so you upload an AAB signed with your
# UPLOAD key. If the four keystore secrets below are set, this signs the bundle
# with jarsigner; otherwise it builds an unsigned/debug-signed bundle (fine to
# confirm the release build compiles, NOT uploadable to Play as-is).
#   Secrets (repo -> Settings -> Secrets and variables -> Actions):
#     ANDROID_KEYSTORE_BASE64   base64 of your upload-keystore.jks
#     ANDROID_KEYSTORE_PASSWORD
#     ANDROID_KEY_ALIAS
#     ANDROID_KEY_PASSWORD
#
# Trigger: manual (workflow_dispatch) or a `play-v*` tag.
on:
  push:
    tags: ["play-v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-aab:
    runs-on: ubuntu-latest
    env:
      KS_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build release AAB
        run: |
          flutter create --org app.qmol --project-name qmol /tmp/app
          cp -r mobile/lib mobile/pubspec.yaml mobile/analysis_options.yaml /tmp/app/
          cd /tmp/app
          flutter pub get
          flutter build appbundle --release --dart-define=QMOL_API=https://qua-22p1.onrender.com
          mkdir -p "$GITHUB_WORKSPACE/dist"
          cp build/app/outputs/bundle/release/app-release.aab "$GITHUB_WORKSPACE/dist/qmol-release.aab"

      - name: Sign with upload key (only if keystore secrets are set)
        if: ${{ env.KS_B64 != '' }}
        run: |
          echo "$KS_B64" | base64 -d > /tmp/upload.jks
          jarsigner -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/upload.jks \
            -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -keypass "${{ secrets.ANDROID_KEY_PASSWORD }}" \
            "$GITHUB_WORKSPACE/dist/qmol-release.aab" \
            "${{ secrets.ANDROID_KEY_ALIAS }}"
          jarsigner -verify "$GITHUB_WORKSPACE/dist/qmol-release.aab" && echo "AAB signed with upload key ✓"

      - name: Note when unsigned
        if: ${{ env.KS_B64 == '' }}
        run: echo "::warning::No ANDROID_KEYSTORE_BASE64 secret — AAB is not upload-signed. Set the keystore secrets to produce a Play-uploadable bundle."

      - uses: actions/upload-artifact@v4
        with:
          name: qmol-release-aab
          path: dist/qmol-release.aab
          if-no-files-found: error

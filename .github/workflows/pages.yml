name: Deploy landing/ to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r landing/* _site/
          # Default landing page
          if [ ! -f _site/index.html ]; then
            echo "no index.html in landing/" && exit 1
          fi
      # Pages must be enabled once in Settings -> Pages -> Source: GitHub Actions.
      # The workflow token cannot enable it itself (Create Pages site -> 403), so
      # until an admin does that these steps soft-fail (continue-on-error) instead
      # of showing a red X. Once Pages is on, they deploy normally.
      - uses: actions/configure-pages@v5
        continue-on-error: true
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        continue-on-error: true
        with:
          path: _site
      - id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

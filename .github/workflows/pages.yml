name: Deploy landing/ to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r landing/* _site/
          # Default landing page
          if [ ! -f _site/index.html ]; then
            echo "no index.html in landing/" && exit 1
          fi
      - uses: actions/configure-pages@v5
        with:
          # Turn Pages on via the API (using the workflow's pages:write token)
          # so the first deploy doesn't require enabling it by hand in Settings.
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4

name: app-screens

# Renders the Flutter app (web build) and screenshots each screen, committing
# them to docs/app-screens/ so they can be reviewed without an emulator.
# Runs when the app or this workflow changes. Its output commit only touches
# docs/app-screens/**, which is NOT in the paths filter, so it can't re-trigger
# itself. Also manually runnable once this is on the default branch.
on:
  push:
    branches: [claude/epic-mendel-a7r40z, main, master]
    paths:
      - "mobile/**"
      - ".github/workflows/app-screens.yml"
      - ".github/scripts/app-shots-trigger"
  workflow_dispatch:

jobs:
  shots:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Build Flutter web
        run: |
          flutter create --org app.qmol --project-name qmol /tmp/app
          cp -r mobile/lib mobile/pubspec.yaml mobile/analysis_options.yaml /tmp/app/
          cd /tmp/app
          flutter pub get
          flutter build web --dart-define=QMOL_API=https://qua-22p1.onrender.com

      - name: Screenshot each app screen
        run: |
          npx --yes http-server /tmp/app/build/web -p 8088 -s &
          sleep 4
          cd /tmp/app
          npm init -y >/dev/null 2>&1
          npm i puppeteer >/dev/null 2>&1
          cat > shots.mjs <<'JS'
          import puppeteer from 'puppeteer';
          import fs from 'fs';
          const OUT = '/tmp/app/shots'; fs.mkdirSync(OUT, {recursive:true});
          const sleep = ms => new Promise(r => setTimeout(r, ms));
          const b = await puppeteer.launch({args:['--no-sandbox','--disable-gpu']});
          const p = await b.newPage();
          const w = 412, h = 892;
          await p.setViewport({width:w,height:h,deviceScaleFactor:2,isMobile:true,hasTouch:true});
          await p.goto('http://127.0.0.1:8088/', {waitUntil:'networkidle2', timeout:60000}).catch(()=>{});
          await sleep(10000);                       // let Flutter + CanvasKit paint
          await p.screenshot({path:OUT+'/app-1-compute.png'});
          const y = h - 24;
          await p.mouse.click(w*0.5, y);  await sleep(4000); await p.screenshot({path:OUT+'/app-2-subscribe.png'});
          await p.mouse.click(w*0.83, y); await sleep(4000); await p.screenshot({path:OUT+'/app-3-account.png'});
          await b.close(); console.log('shots done');
          JS
          node shots.mjs
          ls -la /tmp/app/shots

      - name: Commit screenshots
        run: |
          mkdir -p docs/app-screens
          cp /tmp/app/shots/*.png docs/app-screens/ 2>/dev/null || true
          git config user.name "qmol-ci"
          git config user.email "ci@users.noreply.github.com"
          git add docs/app-screens
          git commit -m "chore(ci): render Flutter app screens [skip ci]" || { echo "no changes"; exit 0; }
          git push origin HEAD:${{ github.ref_name }}
